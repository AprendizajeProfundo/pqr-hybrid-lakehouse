_format_version: "2.1"
_transform: true

services:
  - name: auth-v1-open
    url: http://auth:9999/
    routes:
      - name: auth-v1-open-route
        paths:
          - /auth/v1/
        strip_path: true

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        paths:
          - /rest/v1/
        strip_path: true
